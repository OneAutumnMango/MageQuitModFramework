name: Package BepInEx Framework

on:
  push:
    branches:
      - main
    tags:
      - '?*.?*.?*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: |
          dotnet build MageQuitModFramework.sln --configuration Release

      - name: Create BepInEx package
        run: |
          set -e

          DLL_PATH="MageQuitModFramework/bin/Release/net472/MageQuitModFramework.dll"

          if [ ! -f "$DLL_PATH" ]; then
            echo "Error: $DLL_PATH not found" >&2
            echo "Built files:" >&2
            find . -type f >&2
            exit 1
          fi

          mkdir -p BepInEx/plugins
          cp "$DLL_PATH" BepInEx/plugins/MageQuitModFramework.dll

          zip -r BepInEx.zip BepInEx

      - name: Upload workflow artifact
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: BepInEx
          path: BepInEx.zip

      - name: Upload MageQuitModFramework.dll artifact
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: MageQuitModFramework.dll
          path: bin/Release/net472/MageQuitModFramework.dll

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "BepInEx.zip,bin/Release/net472/MageQuitModFramework.dll"
          bodyFile: README.md
