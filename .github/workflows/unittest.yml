name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Run tests with coverage
        run: |
          dotnet test MageQuitModFramework.sln --configuration Release --collect:"XPlat Code Coverage" --settings MageQuitModFramework.Tests/coverage.runsettings

      - name: Install ReportGenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate coverage report
        run: |
          reportgenerator -reports:MageQuitModFramework.Tests/TestResults/*/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Add coverage summary to job summary
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30
